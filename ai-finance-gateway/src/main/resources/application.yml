    # 数据库连接池配置
    datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://127.0.0.1:3306/ai-finance-account?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: 123456
      hikari:
        connection-timeout: 60000
        maximum-pool-size: 20
        minimum-idle: 10
        idle-timeout: 300000
        max-lifetime: 900000
        connection-test-query: SELECT 1

  # 日志配置
  logging:
    level:
      root: debug

  # mybatis-plus配置
  mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    global-config:
      db-config:
        id-type: auto
